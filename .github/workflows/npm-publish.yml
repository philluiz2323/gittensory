name: Publish MCP Package

on:
  push:
    tags:
      - "mcp-v*.*.*"

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.17.0
          registry-url: https://registry.npmjs.org

      - name: Verify release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          node -e 'const tag=process.env.REF_NAME; if (!/^mcp-v[0-9]+\.[0-9]+\.[0-9]+$/.test(tag)) { throw new Error("Invalid MCP release tag: " + tag); }'
          export VERSION="${REF_NAME#mcp-v}"
          node -e 'const pkg=require("./packages/gittensory-mcp/package.json"); const expected=process.env.VERSION; if (pkg.version !== expected) { throw new Error("package version " + pkg.version + " does not match tag " + expected); }'

      - name: Install dependencies
        run: npm ci

      - name: MCP release validation gate
        run: npm run test:release:mcp

      - name: Packed tarball smoke test
        run: |
          set -euo pipefail
          PACK_JSON="$(npm pack --workspace @jsonbored/gittensory-mcp --json)"
          TARBALL="$(node -e 'const fs=require("fs"); const input=fs.readFileSync(0,"utf8"); process.stdout.write(JSON.parse(input)[0].filename)' <<< "$PACK_JSON")"
          UNEXPECTED_FILES="$(tar -tzf "$TARBALL" | grep -Ev '^(package/(bin|lib|scripts)/.+|package/(package.json|README.md|CHANGELOG.md|LICENSE))$' || true)"
          if [ -n "$UNEXPECTED_FILES" ]; then
            printf '%s\n' "$UNEXPECTED_FILES"
            echo "Unexpected file in package tarball"
            exit 1
          fi
          if tar -xOf "$TARBALL" | grep -E '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|github_pat_|gh[pousr]_|gts_[0-9a-f]{64}|[A-Z0-9_]*(TOKEN|SECRET|PRIVATE_KEY)=)'; then
            echo "Secret-like content found in package tarball"
            exit 1
          fi
          TMP="$(mktemp -d)"
          npm --prefix "$TMP" init -y >/dev/null
          npm --prefix "$TMP" install "$PWD/$TARBALL" >/dev/null
          "$TMP/node_modules/.bin/gittensory-mcp" --help >/dev/null

      - name: Publish with npm trusted publishing
        run: npx -y npm@11.15.0 publish --workspace @jsonbored/gittensory-mcp --access public --provenance

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#mcp-v}"
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<EOF
          Published [@jsonbored/gittensory-mcp v${VERSION}](https://www.npmjs.com/package/@jsonbored/gittensory-mcp/v/${VERSION}) to npm with provenance.

          Install:

          \`\`\`sh
          npm install -g @jsonbored/gittensory-mcp@${VERSION}
          \`\`\`
          EOF
          if gh release view "$REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$REF_NAME" --repo "$GITHUB_REPOSITORY" --title "@jsonbored/gittensory-mcp v${VERSION}" --notes-file "$NOTES_FILE"
          else
            gh release create "$REF_NAME" --repo "$GITHUB_REPOSITORY" --title "@jsonbored/gittensory-mcp v${VERSION}" --notes-file "$NOTES_FILE" --verify-tag
          fi
