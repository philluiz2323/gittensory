name: Type Label

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write

concurrency:
  group: type-label-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  label:
    name: Apply Gittensor reward label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout base branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Apply deterministic Gittensor reward label
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/github-type-label.mjs
